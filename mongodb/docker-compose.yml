services:
  mongodb:
    image: mongo:7
    container_name: opp-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:?MONGO_DATABASE is required}
      TZ: ${TZ:-Asia/Bangkok}

    ports:
      - "${DB_BIND_IP:-0.0.0.0}:${MONGO_PORT:-27017}:27017"

    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      # - ./init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --host localhost --port 27017 -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}" --authenticationDatabase admin --eval "quit(db.adminCommand(''ping'').ok ? 0 : 2)"',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - database-network

volumes:
  mongodb-data:
    name: opp-mongodb-data
    driver: local
  mongodb-config:
    name: opp-mongodb-config
    driver: local

networks:
  database-network:
    name: opp-database-network
    external: true
