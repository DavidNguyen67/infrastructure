services:
  redis:
    image: redis:7-alpine
    container_name: opp-redis
    restart: unless-stopped

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Bangkok}

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}

    ports:
      - "${DB_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - database-network

volumes:
  redis-data:
    name: opp-redis-data
    driver: local

networks:
  database-network:
    name: opp-database-network
    external: true
